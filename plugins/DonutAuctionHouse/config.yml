storage:
  type: SQLITE
  sqlite:
    file: auctions.db
  mysql:
    host: localhost
    port: 3306
    database: donut_auction_house
    username: root
    password: password
    parameters: useSSL=false&characterEncoding=utf8

auction:
  listing-duration-hours: 48
  browse-page-size: 45
  expired-scan-interval-seconds: 60
  min-price: 10
  max-price: 1.0E9

auction-lore:
  mode: APPEND
  separator: true

auction-limits:
  enabled: true
  default-limit: 5
  permissions:
    donutauction:
      limit:
        '10': 10
        '25': 25
        '50': 50
        '100': 100
        unlimited: -1

auction-slots:
  enabled: true
  permissions:
    donutauction:
      slots:
        '10': 10
        '25': 25
        '50': 50
        '100': 100

fast-buy:
  enabled: true
  default-state: false
  require-permission: true

fast-sell:
  enabled: true
  default-state: false
  require-permission: true

debug:
  # When true, logs every invalid/repeated pending-sale claim. When false, samples only.
  pending-sales: false

shulker-support:
  enabled: true
  preview-contents: true

update-checker:
  enabled: true
  notify-console: true
  notify-admins: true
  check-interval-hours: 12

messages:
  prefix: '&6&lAuctionHouse &8» '
  price-below-min: '&cMinimum auction price is &6%min_price%&c.'
