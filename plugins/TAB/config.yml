header-footer:
  enabled: true
  designs:
    world-world1:
      display-condition: '%world%=world1'
      header:
      - an example of world with custom
      footer:
      - header/footer and prefix/suffix
    world-world2;world3:
      display-condition: '%world%=world2|%world%=world3'
      header:
      - This is a shared header for
      - world2 and world3
      footer: []
    server-server1:
      display-condition: '%server%=server1'
      header:
      - an example of server with custom header
      footer: []
    default:
      display-condition: '%world%!=disabledworld'
      header:
      - ''
      - <#00ADFC>&lDonutSMP</#00FCFC>
      - '&f%online% Players'
      - ''
      footer:
      - ''
      - '   &#37BFF9/ꜱʜᴏᴘ  /ᴛᴘᴀ  /ꜱᴇʟʟ   '
      - ''
tablist-name-formatting:
  enabled: true
  disable-condition: '%world%=disabledworld'
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
  - GROUPS:owner,manager,developer,sradmin,admin,srmod,mod,srhelper,helper,media,donut+,default
  - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: '%world%=disabledworld'
playerlist-objective:
  enabled: false
  value: ''
  fancy-value: ' '
  disable-condition: '%world%=disabledworld'
  title: TAB
  render-type: INTEGER
belowname-objective:
  enabled: false
  disable-condition: '%world%=disabledworld'
  fancy-value-default: NPC
  fancy-value: '&c%health%'
  value: '%health%'
  title: '&cHealth'
prevent-spectator-effect:
  enabled: false
bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars:
    ServerInfo:
      style: PROGRESS
      color: '%animation:barcolors%'
      progress: '100'
      text: '&fWebsite: &bwww.domain.com'
scoreboard:
  enabled: false
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard-1.20.3+:
      title: '       <#007CF9>&lServer Name</#00C6F9>    '
      display-condition: '%player-version-id%>=765;%bedrock%=false'
      lines:
      - ''
      - '&#00FC00&l$ &fMoney &#00FC00%vault_eco_balance_formatted%'
      - '&#A303F9★ &fShards &#A303F9%shards_value%'
      - '&#FC0000🗡 &fKills &#FC0000%statistic_player_kills%'
      - '&#F97603☠ &fDeaths &#F97603%statistic_deaths%'
      - '&#00A4FC⌛ &fKeyall &#00A4FC%donut_keyall_countdown%'
      - '&#FCE300⌚ &fPlaytime &#FCE300%statistic_days_played%d %statistic_hours_played%h'
      - '&#00A4FC🪓 &fTeam &#00A4FC%team_name%'
      - ''
      - '&#A8A8A8 Europe (&#00A4FC%ping%&#A8A8A8)'
    scoreboard:
      title: '  <#007CF9>&lServer Name</#00C6F9>  '
      lines:
      - ''
      - '&#00FC00&l$ &fMoney &#00FC00%vault_eco_balance_formatted%'
      - '&#A303F9★ &fShards &#A303F9%shards_value%'
      - '&#FC0000🗡 &fKills &#FC0000%statistic_player_kills%'
      - '&#F97603☠ &fDeaths &#F97603%statistic_deaths%'
      - '&#00A4FC⌛ &fKeyall &#00A4FC%donut_keyall_countdown%'
      - '&#FCE300⌚ &fPlaytime &#FCE300%statistic_days_played%d %statistic_hours_played%h'
      - '&#00A4FC🪓 &fTeam &#00A4FC%team_name%'
      - ''
      - '&#A8A8A8 Europe (&#00A4FC%player_ping%&#A8A8A8)'
layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:1753261242
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      fixed-slots:
      - '1|&3Website&f:'
      - 2|&bmyserver.net
      - '3|&8&m                       '
      - '4|&3Name&f:'
      - 5|&b%player%
      - '7|&3Rank&f:'
      - '8|Rank: %group%'
      - '10|&3World&f:'
      - 11|&b%world%
      - '13|&3Time&f:'
      - 14|&b%time%
      - '21|&3Teamspeak&f:'
      - 22|&bts.myserver.net
      - '23|&8&m                       '
      - '41|&3Store&f:'
      - 42|&bshop.myserver.net
      - '43|&8&m                       '
      groups:
        staff:
          slots:
          - 24-40
          display-condition: permission:tab.staff
        players:
          slots:
          - 44-80
ping-spoof:
  enabled: false
  value: 0
placeholders:
  date-format: dd.MM.yyyy
  time-format: '[HH:mm:ss / h:mm a]'
  time-offset: 0
  register-tab-expansion: false
  locale: en-US
placeholder-output-replacements:
  '%essentials_vanished%':
    'yes': '&7| Vanished'
    'no': ''
conditions:
  nick:
    conditions:
    - '%player%=%essentials_nickname%'
    true: '%player%'
    false: ~%essentials_nickname%
assign-groups-by-permissions: false
primary-group-finding-list:
- Owner
- Admin
- Mod
- Helper
- default
- developer
- donut+
- srmod
- sradmin
- srhelper
- media
- manager
permission-refresh-interval: 1000
debug: false
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true
per-world-playerlist:
  enabled: false
  allow-bypass-permission: false
  ignore-effect-in-worlds:
  - ignoredworld
  - build
  shared-playerlist-world-groups:
    lobby:
    - lobby1
    - lobby2
    minigames:
    - paintball
    - bedwars
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  spy-servers:
  - spyserver1
  - spyserver2
  server-groups:
    lobbies:
    - lobby1
    - lobby2
    group2:
    - server1
    - server2
  update-latency: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
compensate-for-packetevents-bug: false
placeholder-refresh-intervals:
  default-refresh-interval: 500
  '%server_uptime%': 1000
  '%server_tps_1_colored%': 1000
  '%server_unique_joins%': 5000
  '%player_health%': 200
  '%player_ping%': 100
  '%vault_prefix%': 1000
  '%rel_factionsuuid_relation_color%': 1000
config-version: 6
components:
  minimessage-support: true
  disable-shadow-for-heads: true
proxy-support:
  channel-name-suffix: custom
  enabled: true
