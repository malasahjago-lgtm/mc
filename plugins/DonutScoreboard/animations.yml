# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                  WHAT IS THIS FILE?                     в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  This file lets you create named animations that loop   в”Ӯ
# в”Ӯ  forever on the scoreboard sidebar.                     в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  You define an animation once here, then drop a         в”Ӯ
# в”Ӯ  placeholder anywhere in config.yml (or any world       в”Ӯ
# в”Ӯ  override file) to make it appear:                      в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ    {anim:your_animation_name}                           в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  Example вҖ” in scoreboard.lines inside config.yml:       в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ    kills: "{anim:rainbow_dot} &fKills &#FF0000%kills%"  в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  The plugin swaps {anim:rainbow_dot} for whatever frame в”Ӯ
# в”Ӯ  that animation is currently on, every time the         в”Ӯ
# в”Ӯ  scoreboard refreshes.                                  в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                HOW AN ANIMATION WORKS                   в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  An animation is a numbered list of text "frames".      в”Ӯ
# в”Ӯ  The plugin shows one frame at a time, waits            в”Ӯ
# в”Ӯ  "interval" ticks, then moves to the next frame.        в”Ӯ
# в”Ӯ  After the last frame it loops back to frame 1 forever. в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  frame 1 вҶ’ wait вҶ’ frame 2 вҶ’ wait вҶ’ frame 3 вҶ’ ...       в”Ӯ
# в”Ӯ  вҶ’ last frame вҶ’ wait вҶ’ frame 1 вҶ’ ... (loops forever)   в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  Every player on the server sees the same frame at      в”Ӯ
# в”Ӯ  the same time.  Animations are server-wide.            в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                   WHAT IS A TICK?                       в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  A tick is the smallest unit of time in Minecraft.      в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ    1 tick  =  50 milliseconds  =  0.05 seconds         в”Ӯ
# в”Ӯ   20 ticks =   1 second                                 в”Ӯ
# в”Ӯ   40 ticks =   2 seconds                                в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  Use this as a reference when setting "interval":       в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ    interval: 1   вҶ’  changes 20 times per second (max)  в”Ӯ
# в”Ӯ    interval: 2   вҶ’  changes 10 times per second (fast) в”Ӯ
# в”Ӯ    interval: 5   вҶ’  changes  4 times per second        в”Ӯ
# в”Ӯ    interval: 10  вҶ’  changes  2 times per second        в”Ӯ
# в”Ӯ    interval: 20  вҶ’  changes  1 time  per second (slow) в”Ӯ
# в”Ӯ    interval: 40  вҶ’  changes every 2 seconds            в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  вҡ  IMPORTANT вҖ” UPDATE INTERVAL                         в”Ӯ
# в”Ӯ  The scoreboard only refreshes as fast as the           в”Ӯ
# в”Ӯ  "update-interval" setting in config.yml allows.        в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  If update-interval is 20 (1 second) and your           в”Ӯ
# в”Ӯ  animation interval is 2 (fast), you will only see      в”Ӯ
# в”Ӯ  the animation change once per second вҖ” not every       в”Ӯ
# в”Ӯ  2 ticks вҖ” because the scoreboard refreshes too slowly. в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  For smooth animations, lower update-interval           в”Ӯ
# в”Ӯ  in config.yml.  Recommended: 2 or 3.                  в”Ӯ
# в”Ӯ  Keep in mind: lower = more CPU usage.                  в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                    COLOR CODES                          в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  &f = white        &7 = gray         &0 = black        в”Ӯ
# в”Ӯ  &a = green        &c = red          &e = yellow       в”Ӯ
# в”Ӯ  &b = aqua         &9 = blue         &d = purple       в”Ӯ
# в”Ӯ  &l = bold         &o = italic       &r = reset all    в”Ӯ
# в”Ӯ  &#RRGGBB = any hex color  (e.g. &#FF5500 = orange)    в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  Each frame can use any color code you want.            в”Ӯ
# в”Ӯ  Color codes in frames work exactly like they do        в”Ӯ
# в”Ӯ  in regular scoreboard lines.                           в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ              HOW TO CREATE YOUR OWN ANIMATION           в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  1. Pick a unique name using letters, numbers, and      в”Ӯ
# в”Ӯ     underscores only.  No spaces.                       в”Ӯ
# в”Ӯ     Examples:  rainbow_dot   blink   pulse_blue         в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  2. Set "interval" вҖ” how many ticks each frame lasts.   в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  3. Write your frames.  Each frame is a line in the     в”Ӯ
# в”Ӯ     "frames:" list starting with a dash ( - ).          в”Ӯ
# в”Ӯ     Use any text, symbols, or color codes.              в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  4. In config.yml (or a world override file), add the   в”Ӯ
# в”Ӯ     placeholder wherever you want the animation:        в”Ӯ
# в”Ӯ       {anim:your_name}                                  в”Ӯ
# в”Ӯ                                                         в”Ӯ
# в”Ӯ  5. Save this file and run:                             в”Ӯ
# в”Ӯ       /donutscoreboard reload                           в”Ӯ
# в”Ӯ     The animation will appear live instantly.           в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
#
# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ                       TIPS                              в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ  вҖў You can use {anim:name} multiple times in one line.  в”Ӯ
# в”Ӯ  вҖў You can mix different animations on the same line.   в”Ӯ
# в”Ӯ  вҖў Animations work in the scoreboard title too.         в”Ӯ
# в”Ӯ  вҖў Animations work in world override files too.         в”Ӯ
# в”Ӯ  вҖў If you type a name that does not exist, you will     в”Ӯ
# в”Ӯ    see {anim:name?} on the scoreboard вҖ” that is the     в”Ӯ
# в”Ӯ    plugin telling you the name was not found.           в”Ӯ
# в”Ӯ    Check for typos in both this file and config.yml.   в”Ӯ
# в”Ӯ  вҖў You can have as many animations as you want.         в”Ӯ
# в”Ӯ  вҖў Frames play in the order you write them.             в”Ӯ
# в”Ӯ    The list loops automatically вҖ” no setup needed.      в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# ==========================================================


animations:

  # ----------------------------------------------------------
  #  RAINBOW DOT
  #  A filled circle that cycles through all rainbow colors.
  #  Great as a decorative icon next to any stat label.
  #
  #  Usage example in config.yml scoreboard.lines:
  #    kills: "{anim:rainbow_dot} &fKills &#FF0000%kills%"
  #
  #  Result on screen:
  #    в—Ҹ Kills 6    (the dot shifts color continuously)
  #
  #  interval: 3  means each color holds for 3 ticks (0.15s)
  #  9 frames Г— 3 ticks = full loop completes every 27 ticks
  # ----------------------------------------------------------
  rainbow_dot:
    interval: 3
    frames:
      - "&#FF0000в—Ҹ"
      - "&#FF5500в—Ҹ"
      - "&#FFAA00в—Ҹ"
      - "&#FFFF00в—Ҹ"
      - "&#00FF00в—Ҹ"
      - "&#00AAFFв—Ҹ"
      - "&#0055FFв—Ҹ"
      - "&#7700FFв—Ҹ"
      - "&#FF00FFв—Ҹ"


  # ----------------------------------------------------------
  #  RAINBOW STAR
  #  Same rainbow cycle as rainbow_dot but uses a star вҳ….
  #  Useful as an eye-catching icon on important lines
  #  like money or kills.
  #
  #  Usage:
  #    money: "{anim:rainbow_star} &fMoney &#00FF00%vault_eco_balance_formatted%"
  # ----------------------------------------------------------
  rainbow_star:
    interval: 3
    frames:
      - "&#FF0000вҳ…"
      - "&#FF5500вҳ…"
      - "&#FFAA00вҳ…"
      - "&#FFFF00вҳ…"
      - "&#00FF00вҳ…"
      - "&#00AAFFвҳ…"
      - "&#0055FFвҳ…"
      - "&#7700FFвҳ…"
      - "&#FF00FFвҳ…"


  # ----------------------------------------------------------
  #  BLINK
  #  A white star that fades to gray then back to white.
  #  Subtle вҖ” good for drawing attention without being loud.
  #
  #  Usage:
  #    keyall: "{anim:blink} &fKeyall &#00A6FF%keyall%"
  #
  #  interval: 10  means each frame holds for 10 ticks (0.5s)
  #  2 frames Г— 10 ticks = full loop every 20 ticks (1 second)
  # ----------------------------------------------------------
  blink:
    interval: 10
    frames:
      - "&fвҳ…"
      - "&7вҳ…"


  # ----------------------------------------------------------
  #  PULSE BLUE
  #  A blue circle that gradually brightens then dims,
  #  creating a calm heartbeat / breathing effect.
  #
  #  Usage:
  #    footer: "{anim:pulse_blue} &7NA East &7(&#00A6FF%ping%ms&7)"
  #
  #  interval: 4  means each shade holds for 4 ticks (0.2s)
  #  6 frames Г— 4 ticks = full loop every 24 ticks (1.2s)
  # ----------------------------------------------------------
  pulse_blue:
    interval: 4
    frames:
      - "&#001FFFв—Ҹ"
      - "&#0055FFв—Ҹ"
      - "&#0088FFв—Ҹ"
      - "&#00AAFFв—Ҹ"
      - "&#0088FFв—Ҹ"
      - "&#0055FFв—Ҹ"


  # ----------------------------------------------------------
  #  GRADIENT TITLE
  #  Three alternating color gradients that cycle through
  #  red, green, and blue tints.
  #  Designed for use in the scoreboard title field.
  #
  #  Usage in config.yml scoreboard.title:
  #    title: "{anim:gradient_title}"
  #
  #  interval: 15  means each gradient holds for 0.75 seconds.
  #  3 frames Г— 15 ticks = full loop every 45 ticks (2.25s)
  # ----------------------------------------------------------
  gradient_title:
    interval: 15
    frames:
      - "&#FF0000&lD&#FF3300&lo&#FF6600&ln&#FF9900&lu&#FFCC00&lt"
      - "&#00FF00&lD&#00CC00&lo&#009900&ln&#006600&lu&#003300&lt"
      - "&#0088FF&lD&#0066FF&lo&#0044FF&ln&#0022FF&lu&#0000FF&lt"